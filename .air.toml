root = "."
tmp_dir = ".air"

[build]
  cmd = "go build -o .air/taskboard ./cmd/taskboard"
  bin = ".air/taskboard"
  delay = 200
  stop_on_error = true
  include_ext = ["go", "html", "css", "js"]
  exclude_dir = [".git", ".air", "bin", "artifacts", ".tasks"]
  kill_delay = 200

[log]
  time = true

[misc]
  clean_on_exit = true
