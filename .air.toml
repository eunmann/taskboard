root = "."
tmp_dir = ".air"

[build]
  cmd = "go build -o .air/dev ./services/dev"
  bin = ".air/dev"
  delay = 200
  stop_on_error = true

  include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "json", "yaml", "yml"]
  exclude_dir = [".git", ".air", "bin", "logs", "artifacts", "infra", "node_modules"]

[log]
  time = true

[misc]
  clean_on_exit = true
