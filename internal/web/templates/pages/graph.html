{{define "content"}}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-gray-900 dark:text-white">Graph</h1>
            <span class="text-sm text-gray-500 dark:text-gray-400">{{.TaskCount}} tasks</span>
        </div>
    </div>

    <div class="flex flex-wrap items-center gap-6 text-xs text-gray-500 dark:text-gray-400">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-3"><line x1="0" y1="6" x2="24" y2="6" stroke="currentColor" stroke-width="1.5"/><polygon points="20,3 24,6 20,9" fill="currentColor"/></svg>
            <span>parent</span>
        </div>
        <div class="flex items-center gap-2">
            <svg class="w-6 h-3"><line x1="0" y1="6" x2="24" y2="6" stroke="currentColor" stroke-width="3.5"/><polygon points="20,3 24,6 20,9" fill="currentColor"/></svg>
            <span>blocked by</span>
        </div>
        <div class="flex items-center gap-2">
            <svg class="w-6 h-3"><line x1="0" y1="6" x2="24" y2="6" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,3"/><polygon points="20,3 24,6 20,9" fill="currentColor"/></svg>
            <span>relates to</span>
        </div>
        {{if .StatusLegend}}
        <span class="text-gray-400 dark:text-gray-500">|</span>
        <span class="font-medium text-gray-600 dark:text-gray-300">Fill:</span>
        {{range .StatusLegend}}
        <div class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded-full" style="background:{{.Color}}"></span>
            <span>{{.Name}}</span>
        </div>
        {{end}}
        {{end}}
    </div>

    <div class="relative">
        <div class="absolute top-2 right-2 flex items-center gap-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm px-1 py-0.5 z-10">
            <button onclick="window._graphPZ && window._graphPZ.zoomOut()" class="px-2 py-1 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600 rounded" title="Zoom out">&minus;</button>
            <button onclick="window._graphPZ && window._graphPZ.reset()" class="px-2 py-1 text-xs text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-600 rounded" title="Reset zoom">Reset</button>
            <button onclick="window._graphPZ && window._graphPZ.zoomIn()" class="px-2 py-1 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600 rounded" title="Zoom in">+</button>
        </div>
        <div id="graph-container" class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700" style="height:80vh">
            <pre class="mermaid" data-def="{{.MermaidDef}}">{{.MermaidDef}}</pre>
        </div>
    </div>
</div>
<script>
(function() {
    var spzLoading = false;

    function initPanZoom() {
        var container = document.getElementById('graph-container');
        if (!container) return;
        var svg = container.querySelector('svg');
        if (!svg) return;
        if (window._graphPZ) {
            try { window._graphPZ.destroy(); } catch(e) {}
            window._graphPZ = null;
        }
        svg.style.width = '100%';
        svg.style.height = '100%';
        svg.style.maxWidth = 'none';
        window._graphPZ = svgPanZoom(svg, {
            panEnabled: true,
            zoomEnabled: true,
            controlIconsEnabled: false,
            fit: true,
            center: true,
            minZoom: 0.1,
            maxZoom: 20,
            zoomScaleSensitivity: 0.3,
        });
    }

    function onRendered() {
        if (!document.getElementById('graph-container')) return;
        if (typeof svgPanZoom !== 'undefined') { initPanZoom(); return; }
        if (spzLoading) return;
        spzLoading = true;
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js';
        s.onload = function() { spzLoading = false; initPanZoom(); };
        document.head.appendChild(s);
    }

    document.addEventListener('mermaid:rendered', onRendered);
})();
</script>
{{end}}
