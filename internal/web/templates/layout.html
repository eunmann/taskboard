{{define "layout"}}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="htmx-config" content='{"refreshOnHistoryMiss":true}'>
    <title>{{.Title}} - Taskboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='5' width='70' height='90' rx='8' fill='%233b82f6'/><rect x='25' y='20' width='50' height='65' rx='4' fill='white'/><rect x='35' y='15' width='30' height='12' rx='4' fill='%232563eb'/><line x1='33' y1='40' x2='67' y2='40' stroke='%23cbd5e1' stroke-width='3' stroke-linecap='round'/><line x1='33' y1='52' x2='67' y2='52' stroke='%23cbd5e1' stroke-width='3' stroke-linecap='round'/><line x1='33' y1='64' x2='55' y2='64' stroke='%23cbd5e1' stroke-width='3' stroke-linecap='round'/></svg>">

    <script src="/static/vendor/tailwindcss-3.4.17.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af',
                            900: '#1e3a8a',
                        },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="/static/prose.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100"
      x-data="{
          theme: localStorage.getItem('theme') || 'system',
          init() { this.applyTheme() },
          applyTheme() {
              if (this.theme === 'dark' || (this.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                  document.documentElement.classList.add('dark')
              } else {
                  document.documentElement.classList.remove('dark')
              }
              localStorage.setItem('theme', this.theme)
          },
          toggleTheme() {
              this.theme = this.theme === 'dark' ? 'light' : 'dark'
              this.applyTheme()
          }
      }">

    <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-lg font-bold text-primary-600 dark:text-primary-400">{{.Project}}</a>
                    {{if .TaskCount}}<span class="ml-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-1.5 py-0.5 rounded-full">{{.TaskCount}}</span>{{end}}
                    <nav class="hidden sm:flex items-center gap-4 ml-4 text-sm font-medium">
                        <a href="/" class="text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400">List</a>
                        <a href="/forest" class="text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400">Forest</a>
                    </nav>
                </div>
                <div class="flex items-center space-x-3">
                    <button @click="toggleTheme()"
                            class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"
                            title="Toggle dark mode">
                        <template x-if="theme === 'dark'">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                        </template>
                        <template x-if="theme !== 'dark'">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                        </template>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6" hx-history-elt>
        {{template "content" .}}
    </main>

    <script src="/static/vendor/htmx-1.9.10.min.js"></script>
    <script defer src="/static/vendor/alpine-3.14.3.min.js"></script>
    <script>
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var ver = document.querySelector('meta[name="tb-version"]');
            if (ver) {
                evt.detail.headers['If-None-Match'] = '"' + ver.content + '"';
            }
        });
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.xhr.status === 304) {
                evt.detail.shouldSwap = false;
            }
            var etag = evt.detail.xhr.getResponseHeader('ETag');
            if (etag) {
                var ver = document.querySelector('meta[name="tb-version"]');
                if (ver) {
                    ver.content = etag.replace(/"/g, '');
                }
            }
        });
    </script>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                if (e.key === 'Escape') { e.target.blur(); }
                return;
            }
            if (e.key === '/') {
                e.preventDefault();
                var search = document.querySelector('input[name="q"]');
                if (search) { search.focus(); }
                return;
            }
            if (e.key === 'Escape') {
                var back = document.querySelector('a[onclick*="history.back"]');
                if (back) { history.back(); return; }
            }
            var rows = document.querySelectorAll('#task-table tbody tr[hx-get]');
            if (rows.length === 0) { return; }
            var current = document.querySelector('#task-table tbody tr.tb-selected');
            var idx = current ? Array.from(rows).indexOf(current) : -1;
            if (e.key === 'j') {
                idx = Math.min(idx + 1, rows.length - 1);
            } else if (e.key === 'k') {
                idx = Math.max(idx - 1, 0);
            } else if (e.key === 'Enter' && current) {
                current.click();
                return;
            } else { return; }
            if (current) { current.classList.remove('tb-selected', 'bg-primary-50', 'dark:bg-primary-900/20'); }
            rows[idx].classList.add('tb-selected', 'bg-primary-50', 'dark:bg-primary-900/20');
            rows[idx].scrollIntoView({block: 'nearest'});
        });
    </script>
</body>
</html>
{{end}}
