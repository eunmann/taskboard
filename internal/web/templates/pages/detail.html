{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center gap-3">
        <a href="/" onclick="history.back(); return false;"
           class="text-gray-500 dark:text-gray-400 hover:text-primary-600 dark:hover:text-primary-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-xl font-semibold text-gray-900 dark:text-white">{{if .Task.Title}}{{.Task.Title}}{{else}}{{.Task.ID}}{{end}}</h1>
    </div>

    {{template "detail_content" .}}
</div>
{{end}}
