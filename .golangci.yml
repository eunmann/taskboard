version: "2"

linters:
  default: all
  disable:
    - lll
    - wsl
    - varnamelen
    - tagliatelle
    - paralleltest
    - exhaustruct
    - canonicalheader
    - depguard
    - noinlineerr
    - testpackage
  settings:
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
    gosec:
      excludes:
        - G301
        - G304
        - G306
        - G404
    exhaustive:
      default-signifies-exhaustive: true
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - github.com/OWNER/taskboard/internal
  exclusions:
    rules:
      - path: "cmd/"
        linters:
          - forbidigo
          - gochecknoglobals
      - path: "export_test\\.go"
        linters:
          - gochecknoglobals

formatters:
  enable:
    - gci
    - gofmt
    - goimports
    - gofumpt

issues:
  max-issues-per-linter: 0

run:
  timeout: 5m
  tests: true
  go: "1.26"
